<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de funcionário - Crachá virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="container p-5">
    <main>
        <h1>Crachá virtual</h1>
        <div class="container mb-3">

            <label class="form-label" for="nome">Digite seu nome:</label>
            <input class="form-control p-3" type="text" id="nome">

        </div>

        <div class="container mb-3">

            <label class="form-label" for="idade">Digite sua data de nascimento:</label>
            <input class="form-control p-3" type="text" id="idade">

        </div>

        <div class="container mb-3">

            <label class="form-label" for="cargo">Digite seu cargo:</label>
            <input class="form-control p-3" type="text" id="cargo">

        </div>

        <div class="container mb-3">

            <label class="form-label" for="departamento">Digite seu departamento:</label>
            <input class="form-control p-3" type="text" id="departamento">

        </div>

        <div class="container mb-3">

            <label class="form-label" for="acesso-restrito">Tem acesso restrito?</label>
            <input class="form-check-input" type="checkbox" id="acesso-restrito">

        </div>

        <!-- Adicionado os parênteses () no onclick -->
        <button class="btn btn-primary" onclick="imprimirNome()">Enviar dados</button>

    </main>
    <script src="formulario.js"></script>
</body>

</html>
