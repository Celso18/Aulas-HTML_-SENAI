<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Funcionario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input { padding: 8px; width: 250px; margin-top: 5px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        #lista-funcionarios { margin-top: 25px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h1>FUNCIONÁRIO</h1>

    <!-- Campos com os IDs EXATOS do professor -->
    <div class="campo">
        <label for="nome-funcionario">Nome do Funcionário:</label>
        <input type="text" id="nome-funcionario">
    </div>

    <div class="campo">
        <label for="horas-funcionario">Horas Trabalhadas:</label>
        <input type="text" id="horas-funcionario">
    </div>

    <div class="campo">
        <label for="cargo-funcionario">Cargo:</label>
        <input type="text" id="cargo-funcionario">
    </div>

    <button onclick="cadastrarFuncionario()">Cadastrar Funcionário</button>

    <h2>Funcionários Cadastrados</h2>
    <!-- O JavaScript vai injetar os parágrafos aqui dentro -->
    <div id="lista-funcionarios"></div>

    <!-- Link correto para o arquivo dentro da pasta js -->
    <script src="../js/cadastroFuncionario.js"></script>
</body>
</html>
